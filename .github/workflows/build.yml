name: white ping
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        # Use a specific version if needed
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build App
        run: xcodebuild -scheme YourSchemeName -configuration Release CODE_SIGNING_ALLOWED=NO
